spring:
  application:
    name: resolvr

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resolvr_db}
    username: ${POSTGRES_USER:pguser}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

resolvr:
  jwt:
    secret: ${JWT_SECRET:resolvr-default-secret-key-change-in-production-min-256-bits}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}       # 15 minutes
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:user}
    secret-key: ${MINIO_SECRET_KEY:password}
    bucket: ${MINIO_BUCKET:resolvr-attachments}
    presign-expiry-minutes: ${MINIO_PRESIGN_EXPIRY_MINUTES:60}

  storage:
    max-bytes: ${STORAGE_MAX_BYTES:26843545600}        # 25 GB
    target-bytes: ${STORAGE_TARGET_BYTES:21474836480}  # 20 GB
    max-file-bytes: ${STORAGE_MAX_FILE_BYTES:104857600} # 100 MB
    max-age-days: ${STORAGE_MAX_AGE_DAYS:1095}         # 3 years

    image-max-px: ${STORAGE_IMAGE_MAX_PX:1920}
    image-quality: ${STORAGE_IMAGE_QUALITY:0.82}