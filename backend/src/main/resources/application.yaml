spring:
  application:
    name: resolvr

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resolvr_db}
    username: ${POSTGRES_USER:pguser}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

resolvr:
  jwt:
    secret: ${JWT_SECRET:resolvr-default-secret-key-change-in-production-min-256-bits}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}       # 15 minutes
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}