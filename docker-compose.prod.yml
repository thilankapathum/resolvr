version: "3.9"

# ─────────────────────────────────────────────────────────────
# Resolvr — Production Overrides
#
# Usage on server:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file OVERRIDES the base docker-compose.yml.
# No ports are exposed to the host — Nginx Proxy Manager routes
# traffic through the 'npm_network' shared Docker network.
#
# In Nginx Proxy Manager, point resolvr.yourdomain.com to:
#   http://resolvr-frontend:80
# And optionally resolvr-api.yourdomain.com to:
#   http://resolvr-backend:8080
# ─────────────────────────────────────────────────────────────

services:

  db:
    ports: []                   # Remove exposed port in production
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  backend:
    ports: []                   # Not exposed — only accessible within Docker network
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-900000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    ports: []                   # Not exposed — Nginx Proxy Manager handles it
    restart: always
    build:
      args:
        API_URL: ${API_URL}

networks:
  default:
    name: resolvr_network

  # Attach to Nginx Proxy Manager's network so NPM can route to containers
  npm_network:
    external: true
    name: npm_network           # Must match the network name in your NPM Docker setup