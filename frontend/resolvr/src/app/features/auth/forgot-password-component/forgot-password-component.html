<div class="card bg-base-100 shadow-xl border border-base-300">
  <div class="card-body">
    @if (!submitted()) {
      <h2 class="card-title text-xl font-bold mb-2">Forgot Password</h2>
      <p class="text-base-content/60 text-sm mb-6">
        Enter your email and we'll send a reset link if the account exists.
      </p>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="form-control">
          <label class="label"><span class="label-text font-medium">Email</span></label>
          <input type="email" formControlName="email" placeholder="you@company.com"
                 class="input input-bordered w-full"
                 [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched" />
        </div>
        <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
          @if (loading()) { <span class="loading loading-spinner loading-sm"></span> }
          Send Reset Link
        </button>
      </form>
      <div class="text-center mt-4 text-sm">
        <a routerLink="/login" class="link link-primary">Back to Sign In</a>
      </div>
    } @else {
      <div class="text-center py-4">
        <div class="w-16 h-16 rounded-full bg-info/10 flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-info" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold">Check your inbox</h2>
        <p class="text-base-content/60 text-sm mt-2">
          If that email is registered, a password reset link has been sent.
        </p>
        <a routerLink="/login" class="btn btn-primary btn-sm mt-6">Back to Sign In</a>
      </div>
    }
  </div>
</div>
