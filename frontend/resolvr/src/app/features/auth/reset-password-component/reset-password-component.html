<div class="card bg-base-100 shadow-xl border border-base-300">
  <div class="card-body">
    @if (!done()) {
      <h2 class="card-title text-xl font-bold mb-2">Reset Password</h2>
      <p class="text-base-content/60 text-sm mb-6">Enter your new password below.</p>

      @if (errorMessage()) {
        <div class="alert alert-error mb-4">
          <span class="text-sm">{{ errorMessage() }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <div class="form-control">
          <label class="label"><span class="label-text font-medium">New Password</span></label>
          <input type="password" formControlName="newPassword" placeholder="Min. 8 characters"
                 class="input input-bordered w-full"
                 [class.input-error]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" />
        </div>
        <div class="form-control">
          <label class="label"><span class="label-text font-medium">Confirm Password</span></label>
          <input type="password" formControlName="confirmPassword" placeholder="Repeat password"
                 class="input input-bordered w-full"
                 [class.input-error]="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched" />
          @if (form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched) {
            <label class="label"><span class="label-text-alt text-error">Passwords do not match.</span></label>
          }
        </div>
        <button type="submit" class="btn btn-primary w-full" [disabled]="loading()">
          @if (loading()) { <span class="loading loading-spinner loading-sm"></span> }
          Set New Password
        </button>
      </form>
    } @else {
      <div class="text-center py-4">
        <div class="w-16 h-16 rounded-full bg-success/10 flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="text-xl font-bold">Password Reset!</h2>
        <p class="text-base-content/60 text-sm mt-2">Your password has been updated successfully.</p>
        <a routerLink="/login" class="btn btn-primary btn-sm mt-6">Sign In</a>
      </div>
    }
  </div>
</div>
