<div class="drawer lg:drawer-open min-h-screen bg-base-100">
  <input id="drawer-toggle" type="checkbox" class="drawer-toggle"
         [checked]="drawerOpen" />

  <!-- Page content -->
  <div class="drawer-content flex flex-col">
    <!-- Top bar -->
    <header class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-20 px-4">
      <div class="flex-none lg:hidden">
        <label for="drawer-toggle" class="btn btn-square btn-ghost"
               (click)="toggleDrawer()">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </label>
      </div>
      <div class="flex-1">
        <span class="text-base font-semibold text-base-content/60 hidden sm:block">
          {{ pageTitle() }}
        </span>
      </div>
      <div class="flex-none flex items-center gap-3">
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost gap-2 normal-case">
            <div class="avatar placeholder">
              <div class="bg-primary text-primary-content rounded-full w-8">
                <span class="text-sm font-bold">{{ initials() }}</span>
              </div>
            </div>
            <div class="hidden md:block text-left">
              <div class="text-sm font-medium">{{ auth.currentUser()?.fullName }}</div>
              <div class="text-xs text-base-content/50">{{ roleLabel() }}</div>
            </div>
          </div>
          <ul tabindex="0"
              class="dropdown-content menu bg-base-100 rounded-box z-10 w-52 p-2 shadow border border-base-300 mt-2">
            <li><a routerLink="/app/complaints/new" (click)="closeDrawer()">New Complaint</a></li>
            <li><hr class="my-1 border-base-300"></li>
            <li><button (click)="auth.logout()" class="text-error">Sign Out</button></li>
          </ul>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 p-4 lg:p-6">
      <router-outlet />
    </main>
  </div>

  <!-- Sidebar -->
  <div class="drawer-side z-30">
    <label for="drawer-toggle" class="drawer-overlay"
           (click)="closeDrawer()"></label>
    <aside class="w-64 min-h-full bg-base-100 border-r border-base-300 flex flex-col">

      <!-- Brand -->
<!--      <div class="flex items-center gap-2 px-5 py-5 border-b border-base-300">-->
<!--        <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center flex-shrink-0">-->
<!--          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">-->
<!--            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"-->
<!--                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>-->
<!--          </svg>-->
<!--        </div>-->
<!--        <span class="text-xl font-bold tracking-tight">Resolvr</span>-->
<!--      </div>-->

      <!-- Logo -->
      <div class="flex items-center gap-3 px-5 py-5 border-b border-base-300">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center">
<!--          <svg class="text-secondary" width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">-->
<!--            <path d="M9 15H15M9 12H15M3 6V16.8C3 17.9201 3 18.4796 3.21799 18.9074C3.40973 19.2837 3.71547 19.5905 4.0918 19.7822C4.5192 20 5.07899 20 6.19691 20H17.8037C18.9216 20 19.4806 20 19.908 19.7822C20.2843 19.5905 20.5905 19.2841 20.7822 18.9078C21.0002 18.48 21.0002 17.9199 21.0002 16.7998L21.0002 9.19978C21.0002 8.07967 21.0002 7.51962 20.7822 7.0918C20.5905 6.71547 20.2837 6.40973 19.9074 6.21799C19.4796 6 18.9201 6 17.8 6H12M3 6H12M3 6C3 4.89543 3.89543 4 5 4H8.67452C9.1637 4 9.40915 4 9.63933 4.05526C9.8434 4.10425 10.0379 4.18526 10.2168 4.29492C10.4186 4.41856 10.5918 4.59183 10.9375 4.9375L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>-->
<!--          </svg>-->
          <svg class="w-8 h-8 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-semibold text-secondary">SLTMobitel <span class="title-font font-normal text-accent">Resolvr</span></p>
          <p class="text-xs text-base-content/50">Complaint Tracking System</p>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 p-3 space-y-1">
        <ul class="menu menu-sm p-0 gap-1">
          <li>
            <a routerLink="/app/dashboard" routerLinkActive="active"
               (click)="closeDrawer()"
               class="flex items-center gap-3 rounded-lg px-3 py-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
              </svg>
              Dashboard
            </a>
          </li>
          <li>
            <a routerLink="/app/complaints" routerLinkActive="active"
               [routerLinkActiveOptions]="{exact: false}"
               (click)="closeDrawer()"
               class="flex items-center gap-3 rounded-lg px-3 py-2">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              Complaints
            </a>
          </li>

          @if (auth.isAdmin()) {
            <li class="menu-title mt-4">
              <span class="text-xs uppercase tracking-wider text-base-content/40 font-semibold">
                Administration
              </span>
            </li>
            <li>
              <a routerLink="/app/admin/users" routerLinkActive="active"
                 (click)="closeDrawer()"
                 class="flex items-center gap-3 rounded-lg px-3 py-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                User Management
              </a>
            </li>
            <li>
              <a routerLink="/app/admin/regions" routerLinkActive="active"
                 (click)="closeDrawer()"
                 class="flex items-center gap-3 rounded-lg px-3 py-2">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                </svg>
                Regions & Districts
              </a>
            </li>
          }
        </ul>
      </nav>

      <!-- Footer -->
      <div class="p-4 border-t border-base-300">
        <div class="text-xs text-base-content/40 text-center">Resolvr v0.1</div>
      </div>
    </aside>
  </div>
</div>

<app-toast-container-component />
